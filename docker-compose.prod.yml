# Configuración de producción para Packfy Cuba MVP v4.0 - Móvil Optimizado

version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=https://api.packfy.cu
      - VITE_APP_VERSION=4.0
      - VITE_INTERFACE_MODE=mobile-optimized
      - VITE_FORM_STYLE=cuban-mobile
      - VITE_FEATURE_MOBILE_NAV=enabled
      - VITE_FEATURE_PWA_OPTIMIZED=enabled
      - VITE_FEATURE_TOUCH_TARGETS=enabled
      - VITE_FEATURE_SAFE_AREA=enabled
    volumes:
      - ./ssl:/etc/ssl/certs:ro
    depends_on:
      - backend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.packfy-mobile.rule=Host(`packfy.cu`) || Host(`www.packfy.cu`)"
      - "traefik.http.routers.packfy-mobile.tls.certresolver=letsencrypt"
      - "traefik.http.services.packfy-mobile.loadbalancer.server.port=80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings_production
      - DATABASE_URL=postgresql://packfy_user:${DB_PASSWORD}@database:5432/packfy_db
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=api.packfy.cu,www.packfy.cu,packfy.cu
      - CORS_ALLOWED_ORIGINS=https://packfy.cu,https://www.packfy.cu
      - INTERFACE_VERSION=4.0
      - FORM_STYLE=cuban-mobile
      - FEATURE_MOBILE_OPTIMIZED=enabled
      - FEATURE_PWA_ENHANCED=enabled
    depends_on:
      - database
      - redis
    restart: unless-stopped

  database:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=packfy_db
      - POSTGRES_USER=packfy_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl/certs:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
