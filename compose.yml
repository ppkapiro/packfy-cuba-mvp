# 🇨🇺 PACKFY CUBA - Docker Compose v4.0
# Sistema moderno de gestión de envíos con interfaz glassmorphism

name: packfy-cuba-mvp

services:
  # 📊 Base de datos PostgreSQL
  database:
    image: postgres:16-alpine
    container_name: packfy-database
    environment:
      POSTGRES_DB: packfy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped
    networks:
      - packfy_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d packfy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 🚀 Redis para caché y sesiones
  redis:
    image: redis:7-alpine
    container_name: packfy-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - packfy_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 🔧 Backend Django API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: packfy-backend-v4
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 🔧 CONFIGURACIÓN DEL SISTEMA
      - DJANGO_SETTINGS_MODULE=config.settings_development
      - ENVIRONMENT=development
      - PYTHONPATH=/app

      # 🔒 SEGURIDAD
      - DJANGO_DEBUG=true
      - DJANGO_SECRET_KEY=django-insecure-dev-key-v4-glassmorphism-2025
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,backend,0.0.0.0,192.168.12.178,172.20.0.5

      # 🗄️ BASE DE DATOS
      - POSTGRES_DB=packfy
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=database
      - POSTGRES_PORT=5432

      # 🚀 REDIS PARA CACHÉ
      - REDIS_URL=redis://redis:6379/1
      - CACHE_BACKEND=redis

      # 🌐 CORS - Incluye IPs para acceso móvil
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,https://localhost:5173,http://127.0.0.1:5173,https://127.0.0.1:5173,http://192.168.12.178:5173,https://192.168.12.178:5173,http://172.20.0.5:5173,https://172.20.0.5:5173

      # 🔧 CONFIGURACIONES ESPECÍFICAS MÓVILES
      - INTERFACE_VERSION=4.0
      - FORM_STYLE=cuban-mobile
      - SUBSCRIPTION_MODE=disabled
      - FEATURE_MOBILE_OPTIMIZED=enabled
      - FEATURE_PWA_ENHANCED=enabled
      - FEATURE_UNIFIED_MANAGEMENT=enabled
      - USE_HTTPS=true
      - SECURE_SSL_REDIRECT=false
      - SECURE_PROXY_SSL_HEADER=HTTP_X_FORWARDED_PROTO,https
    volumes:
      - ./backend:/app
      - static_files:/app/static
      - media_files:/app/media
      - ./backend/logs:/app/logs
      - ./frontend/certs:/app/certs
    ports:
      - "8000:8000"
      - "8443:8443"
    restart: unless-stopped
    networks:
      - packfy_network
    healthcheck:
      test: ["CMD", "python", "manage.py", "check"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 🌐 Frontend React Móvil Optimizado v4.0
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: packfy-frontend-mobile-v4.0
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=https://localhost:8443
      - VITE_APP_TITLE=Packfy Cuba - Móvil Optimizado v4.0
      - VITE_APP_VERSION=4.0
      - VITE_INTERFACE_MODE=mobile-optimized
      - VITE_FORM_STYLE=cuban-mobile
      - VITE_APP_NAME=Packfy Cuba - Móvil Optimizado
      - VITE_SUBSCRIPTION_MODE=disabled
      - VITE_FEATURE_MOBILE_NAV=enabled
      - VITE_FEATURE_PWA_OPTIMIZED=enabled
      - VITE_FEATURE_TOUCH_TARGETS=enabled
      - VITE_FEATURE_SAFE_AREA=enabled
      - VITE_FEATURE_UNIFIED_PAGES=enabled
      - VITE_ENABLE_HTTPS=true
      - HOST=0.0.0.0
      - PORT=5173
      - HTTPS=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/certs:/app/certs
    ports:
      - "5173:5173"
    restart: unless-stopped
    networks:
      - packfy_network
    healthcheck:
      test: ["CMD-SHELL", "curl -k -f https://localhost:5173 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # 🧪 Runner de E2E con Playwright (contenedor efímero)
  e2e:
    image: mcr.microsoft.com/playwright:v1.54.2-jammy
    container_name: packfy-e2e-runner
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    working_dir: /tests
    environment:
      - E2E_BASE_URL=https://frontend:5173
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      - CI=1
    volumes:
      - ./frontend:/tests
    networks:
      - packfy_network
    # Ejecuta solo el smoke por defecto; puedes cambiar a "npx playwright test"
    command:
      [
        "bash",
        "-lc",
  "npm install --no-audit --no-fund && npx playwright test e2e/smoke-auth.e2e.ts",
      ]

  # 🔄 Servicio de Desarrollo (Opcional para Hot Reload)
  dev-tools:
    image: node:22-alpine
    container_name: packfy-dev-tools
    working_dir: /workspace
    volumes:
      - .:/workspace
      - /workspace/node_modules
    environment:
      - NODE_ENV=development
    profiles:
      - dev
    command: tail -f /dev/null

volumes:
  postgres_data:
    name: packfy_postgres_data_v4
  redis_data:
    name: packfy_redis_data_v4
  static_files:
    name: packfy_static_files_v4
  media_files:
    name: packfy_media_files_v4

networks:
  packfy_network:
    name: packfy_network_v4
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
