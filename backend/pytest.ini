# 🇨🇺 PACKFY CUBA - Configuración de Pytest v4.1

[pytest]
DJANGO_SETTINGS_MODULE = config.settings_test
python_files = tests.py test_*.py *_tests.py
python_classes = Test* *Tests
python_functions = test_*
testpaths = tests envios/tests usuarios/tests empresas/tests
addopts = --tb=short --strict-markers

markers =
    unit: Tests unitarios rápidos
    integration: Tests de integración
    api: Tests de API endpoints
    slow: Tests que tardan más de 5 segundos
    auth: Tests de autenticación
    cache: Tests de sistema de caché
    security: Tests de seguridad

# Coverage (se puede mover a .coveragerc si se desea)
filterwarnings =
    ignore::DeprecationWarning
